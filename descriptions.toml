# Описания фич для столбца Description в comparison.md / comparison.html.
# Файл опциональный: если его нет или нужного ключа нет — ячейка будет пустой.
#
# Структура: три необязательные секции — [patches], [utils], [contrib].
# Ключ — это значение из столбца Feature (точно как в conf.json / contrib.json),
# значение — строка с описанием. Имена со слешами обязательно в кавычках.
#
# Поддерживаются многострочные значения в тройных кавычках; в Markdown
# переносы строк превратятся в <br>, а вертикальная черта `|` экранируется.

