[utils]
"columnar_migrator"     = "[columnar_migrator](https://docs.tantorlabs.ru/tdb/ru/latest/se/columnar_migrator.html) — переносит данные из расширения Citus Columnar в расширение [Hydra Columnar](https://docs.tantorlabs.ru/tdb/ru/latest/se/hydra.html)"
"data_generator"        = "[data_generator](https://docs.tantorlabs.ru/tdb/ru/latest/se/data_generator.html) — генерирует фейковые данные для тестирования и разработки. Поддерживает различные типы данных и позволяет настраивать генерируемые данные с помощью шаблонов"
"pg_diag_setup"         = "[pg_diag_setup](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_diag_setup.html) — автоматизирует настройку расширений диагностики производительности Tantor SE, таких как `pg_store_plans`, `pg_stat_statements`, `pg_stat_kcache`, `auto_explain`, `pg_buffercache` и других. Это упрощает интеграцию систем мониторинга баз данных"
"pg_integrity_verifier" = "[pg_integrity_verifier](https://docs.tantorlabs.ru/tdb/ru/latest/certified/pg_integrity_verifier.html) — проверяет целостность объектов базы данных и обнаруживает несоответствия в данных и метаданных"
"pg_sec_check"          = "[pg_sec_check](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_sec_check.html) — проводит аудит безопасности конфигураций базы данных Tantor SE. Он автоматизирует проверку различных аспектов безопасности: от настроек сервера до параметров, специфичных для базы данных, и предоставляет подробные отчеты об обнаруженных проблемах вместе с практическими рекомендациями по их устранению"
"pgcompacttable"        = "[pgcompacttable](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgcompacttable.html) — уменьшает размер раздутых таблиц и индексов без использования тяжелых блокировок. Он разработан для реорганизации данных в таблицах и перестроения индексов с целью освобождения дискового пространства без влияния на производительность базы данных"
"pgcopydb"              = "[pgcopydb](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgcopydb.html) — автоматизирует выполнение pg_dump и pg_restore между двумя работающими серверами Postgres. Чтобы как можно быстрее скопировать базу данных на другой сервер, желательно использовать параллельные опции pg_dump и при этом иметь возможность передавать данные в несколько задач pg_restore"
"slru_upgrader"         = "[slru_upgrader](https://docs.tantorlabs.ru/tdb/ru/latest/se/slru_upgrader.html) — автоматически переименовывает параметры конфигурации, связанные с SLRU-буферами, при обновлении основной версии с Tantor SE 15. Эта утилита помогает избежать проблемы, когда сервер не может запуститься после обновления из-за наличия старых имён параметров в файле `postgresql.conf`"

[contrib]
"auto_dump"            = "[auto_dump](https://docs.tantorlabs.ru/tdb/ru/latest/se/auto_dump.html) — помогает создавать самодостаточную репродукцию проблемных запросов, которые выполняются в рабочей среде (например, из 1С)"
"citus"                = "[Citus Columnar](https://docs.tantorlabs.ru/tdb/ru/15_17/se/citus.html) — предоставляет колонковый метод хранения данных с возможностью сжатия для уменьшения объёма ввода-вывода и обеспечения высокой производительности. Применимо только для добавления данных, например, для временных рядов данных и витрин корпоративных хранилищ"
"credcheck"            = "[credcheck](https://docs.tantorlabs.ru/tdb/ru/latest/se/credcheck.html) — обеспечивает проверку учетных данных, во время создания пользователя, смены пароля и переименования пользователя. Используя это расширение, можно определить набор правил для разрешения определенного набора учетных данных и набор правил для отклонения определенного типа учетных данных. Расширение разработано на основе хука check_password_hook в PostgreSQL"
"csn"                  = "[csn](https://docs.tantorlabs.ru/tdb/ru/latest/se/csn.html) — предоставляет функции для получения [номера последовательности фиксации (Commit Sequence Number)](https://docs.tantorlabs.ru/tdb/ru/latest/se/csn.html), связанного с транзакциями и снимками"
"dbcopies_decoding"    = "[dbcopies_decoding](https://docs.tantorlabs.ru/tdb/ru/latest/se/dbcopies_decoding.html) — поддерживает механизм копирования базы данных и ускоритель данных"
"fasttrun"             = "[fasttrun](https://docs.tantorlabs.ru/tdb/ru/latest/se/fasttrun.html) — предоставляет небезопасную для транзакций функцию для усечения временных таблиц без увеличения размера pg_class. Этот модуль необходим для поддержки 1C Enterprise. Быстрая операция усечения не является транзакционной, поэтому ее результаты не могут быть отменены и сразу становятся видимыми во всех сессиях независимо от уровня изоляции"
"fulleq"               = "[fulleq](https://docs.tantorlabs.ru/tdb/ru/latest/se/fulleq.html) — предоставляет дополнительный оператор эквивалентности для совместимости с Microsoft SQL Server. Этот модуль необходим для поддержки 1C Enterprise"
"hydra"                = "[Hydra Columnar](https://docs.tantorlabs.ru/tdb/ru/latest/se/hydra.html) — обеспечивает колоночный метод хранения данных с возможностью сжатия для уменьшения объёма ввода-вывода и обеспечения высокой производительности. Применимо только для добавления (append-only), например, для временных рядов данных и витрин корпоративных хранилищ"
"hypopg"               = "[hypopg](https://docs.tantorlabs.ru/tdb/ru/latest/se/hypopg.html) — добавляет поддержку гипотетических индексов. Гипотетический, или виртуальный индекс — это индекс, который в действительности не существует, и поэтому его создание не требует ресурсов ЦП, диска или каких-либо ресурсов. Они полезны, чтобы знать, могут ли определенные индексы повысить производительность для проблемных запросов. Дает возможность узнать, будет ли СУБД использовать эти индексы или нет, не тратя ресурсы на их создание"
"mchar"                = "[mchar](https://docs.tantorlabs.ru/tdb/ru/latest/se/mchar.html) — разработан для улучшения поддержки 1C: Предприятие, самой популярной российской CRM и ERP системы. Он реализует типы MCHAR и MVARCHAR, которые совместимы с MS SQL CHAR и VARCHAR соответственно. Кроме того, эти типы используют библиотеку ICU для сравнения и преобразования регистра, поэтому их поведение одинаково на разных операционных системах. СУБД Tantor также включает расширение citext, которое предоставляет типы, аналогичные MCHAR. Однако это расширение не эмулирует поведение MS-SQL в отношении пробелов в конце значения"
"oauth_base_validator" = "[oauth_base_validator](https://docs.tantorlabs.ru/tdb/ru/latest/se/oauth-validator.html) — реализует простой валидатор токенов OAuth 2.0 для встроенной поддержки потока авторизации устройства"
"online_analyze"       = "[online_analyze](https://docs.tantorlabs.ru/tdb/ru/latest/se/online_analyze.html) — выполняет активацию сбора статистики сразу после операций INSERT/UPDATE/DELETE/SELECT INTO для задействованных таблиц"
"orafce"               = "[orafce](https://docs.tantorlabs.ru/tdb/ru/latest/se/orafce.html) — представляет собой набор функций, обеспечивающих совместимость с базами данных Oracle. Эти функции позволяют упростить миграцию на Tantor и снизить затраты на перенастройку приложений"
"page_repair"          = "[page_repair](https://docs.tantorlabs.ru/tdb/ru/latest/se/page_repair.html) — предназначен для восстановления отдельных поврежденных страниц с использованием резервных данных с сервера репликации. Он позволяет сэкономить время на операции восстановления, так как не требует восстановления всех данных, а только отдельных страниц"
"pg_archive"           = "[pg_archive](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_archive.html) — позволяет автоматически архивировать исторические данные из секционированных таблиц"
"pg_background"        = "[pg_background](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_background.html) — позволяет выполнять команды в фоновом режиме, такие как VACUUM и CREATE INDEX CONCURRENTLY, из SQL, а также запускать автономные транзакции"
"pg_cron"              = "[pg_cron](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_cron.html) — это планировщик заданий на основе cron, работающий внутри базы данных как расширение. Он использует тот же синтаксис, что и обычный cron, и позволяет планировать выполнение команд непосредственно из базы данных Tantor"
"pg_csm"               = "[pg_csm](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_csm.html) — предоставляет диагностическую оценку сжимаемости таблиц и индексов, использующих Compression Storage Manager"
"pg_hint_plan"         = "[pg_hint_plan](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_hint_plan.html) — позволяет настраивать планы выполнения SQL-запросов с использованием так называемых \"подсказок\" в комментариях SQL. Это дает возможность компенсировать ошибки планировщика, возникающие в критических случаях"
"pg_ilm"               = "[pg_ilm](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_ilm.html) — расширение управления жизненным циклом данных для Tantor SE, предназначенное для вычисления рекомендаций по архивированию для обычных таблиц и партиций (leaf partitions)"
"pg_ivm"               = "[pg_ivm](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_ivm.html) — предоставляет функцию инкрементного обслуживания представлений (IVM) для Tantor SE"
"pg_partman"           = "[pg_partman](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_partman.html) — позволяет создавать и управлять секциями таблицы как на основе времени, так и на основе последовательностей"
"pg_qualstats"         = "[pg_qualstats](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_qualstats.html) — сохраняет статистические данные по найденным предикатам в операторах WHERE и предложениях JOIN. Это позволит проанализировать наиболее часто выполняемые квалификаторы (предикаты) в вашей базе данных, а также идентифицировать коррелированные столбцы, определяя, какие столбцы чаще всего запрашиваются вместе"
"pg_query_id"          = "[pg_query_id](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_query_id.html) — позволяет управлять аспектами вычисления идентификатора запроса"
"pg_repack"            = "[pg_repack](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_repack.html) — позволяет удалять раздувание таблиц и индексов (BLOAT) и, при необходимости, восстанавливать физический порядок кластеризованных индексов. В отличие от CLUSTER и VACUUM FULL, он работает онлайн, не удерживая эксклюзивную блокировку обрабатываемых таблиц во время обработки"
"pg_sample_profile"    = "[pg_sample_profile](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_sample_profile.html) — обеспечивает профилирование активности базы данных на основе выборки"
"pg_stat_advisor"      = "[pg_stat_advisor](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_stat_advisor.html) — позволяет анализировать производительность запросов и создавать дополнительные статистики для улучшения плана запроса"
"pg_stat_kcache"       = "[pg_stat_kcache](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_stat_kcache.html) — собирает статистику о реальных операциях чтения и записи, выполняемых на уровне файловой системы"
"pg_store_plans"       = "[pg_store_plans](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_store_plans.html) — предоставляет средства для отслеживания статистики плана выполнения для всех операторов SQL, выполняемых сервером Tantor"
"pg_tde"               = "[pg_tde](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_tde.html) — реализует прозрачное шифрование данных (TDE) на уровне хранения. Оно не шифрует данные в памяти или при передаче по сети"
"pg_throttle"          = "[pg_throttle](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_throttle.html) — позволяет ограничивать скорость выполнения запросов"
"pg_trace"             = "[pg_trace](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_trace.html) — предоставляет возможность для глубокого анализа и профилирования SQL-запросов, особенно актуальное для пользователей платформы 1С"
"pg_uuidv7"            = "[pg_uuidv7](https://docs.tantorlabs.ru/tdb/ru/17_9/se/pg_uuidv7.html) - обеспечивает поддержку работы с типом данных UUIDv7"
"pg_variables"         = "[pg_variables](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_variables.html) — предоставляет функции для работы с переменными различных типов в текущей сессии пользователя"
"pg_wait_profile"      = "[pg_wait_profile](https://docs.tantorlabs.ru/tdb/ru/17_9/se/pg_wait_profile.html) — обеспечивает профилирование активности базы данных на основе выборки"
"pg_wait_sampling"     = "[pg_wait_sampling](https://docs.tantorlabs.ru/tdb/ru/latest/se/pg_wait_sampling.html) — предоставляет информацию о текущем событии ожидания конкретного процесса. Однако для того, чтобы собрать описательную статистику поведения сервера, пользователь должен многократно отбирать текущее событие ожидания. pg_wait_sampling — это расширение для сбора выборочной статистики событий ожидания, которое предотвращает избыточное семплирование ожидания текущего события"
"pgaudit"              = "[pgaudit](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgaudit.html) — предоставляет детализированное ведение журнала аудита сеансов и/или объектов через стандартное средство ведения журнала Tantor DBMS. Цель pgAudit — предоставить пользователям Tantor DBMS возможность создавать журналы аудита, которые часто требуются для соблюдения государственных, финансовых или ISO сертификаций"
"pgauditlogtofile"     = "[pgauditlogtofile](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgauditlogtofile.html) — это дополнение к pgAudit, которое перенаправляет строки аудита в отдельный файл, вместо использования диспетчера журналирования сервера PostgreSQL. В итоге мы получаем файл аудита, который можно легко ротировать, не загрязняя журналы сервера этими сообщениями. Журналы аудита в системах с высокой нагрузкой могут очень быстро расти. Это расширение позволяет автоматически ротировать файлы на основе заданного количества минут"
"pgl_ddl_deploy"       = "[pgl_ddl_deploy](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgl_ddl_deploy.html) — это расширение для отправки команд DDL на сервер-реплику во время логической репликации"
"pgq"                  = "[pgq](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgq.html) — предоставляет универсальную высокопроизводительную не заблокированную очередь с простым API, основанным на функциях SQL"
"pgsql-http"           = "[pgsql-http](https://docs.tantorlabs.ru/tdb/ru/latest/se/pgsql-http.html) — дает возможность написать триггер, вызывающий веб-сервис, способный вернуть результат, либо заставить этот сервис обновляться в соответствии с новым состоянием базы данных"
"plantuner"            = "[plantuner](https://docs.tantorlabs.ru/tdb/ru/latest/se/plantuner.html) — позволяет использовать подсказки для планировщика"
"transp_anon"          = "[transp_anon](https://docs.tantorlabs.ru/tdb/ru/latest/se/transp_anon.html) (прозрачная анонимизация) — это расширение для маскировки или замены персонально идентифицируемой информации или коммерчески чувствительных данных из базы данных Tantor SE"
"vector"               = "[vector](https://docs.tantorlabs.ru/tdb/ru/latest/se/vector.html) — позволяет находить сходства векторов"
"wal2json"             = "!!!Должны удалить из contrib.json!!!"
